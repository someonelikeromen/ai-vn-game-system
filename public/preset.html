<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>预设编辑器 · 无限武库</title>
  <script src="theme.js"></script>
  <link rel="stylesheet" href="preset.css">
</head>
<body>

<!-- ── Topbar ──────────────────────────────────────────────────────────── -->
<header id="topbar">
  <h1>⚔ 无限武库</h1>
  <span style="font-size:13px;color:var(--text2)">📝 预设编辑器</span>
  <div class="topbar-sep"></div>
  <button class="btn" id="btn-back">← 返回游戏</button>
  <a href="/settings" class="btn" style="text-decoration:none">⚙ 设置</a>
</header>

<!-- ── File bar ────────────────────────────────────────────────────────── -->
<div id="file-bar">
  <span class="path-label" id="preset-path-label">未加载</span>
  <button class="btn" id="btn-reload">↺ 重新加载</button>
  <button class="btn primary" id="btn-save">💾 保存</button>
</div>

<!-- ── Tabs ────────────────────────────────────────────────────────────── -->
<div id="tabs">
  <button class="tab-btn active" data-tab="prompts">提示词列表</button>
  <button class="tab-btn" data-tab="phases">阶段管理</button>
  <button class="tab-btn" data-tab="regex">正则规则</button>
</div>

<!-- ── Content ─────────────────────────────────────────────────────────── -->
<div id="content">

  <!-- Prompts Tab -->
  <div id="tab-prompts" class="tab-pane active">
    <div class="section-header">
      <h2>提示词条目</h2>
      <span class="item-count" id="prompt-count">0</span>
      <button class="btn" id="btn-add-prompt" style="margin-left:auto;font-size:12px">＋ 添加条目</button>
    </div>
    <div id="prompt-list" class="sortable-list">
      <div class="empty-hint">加载中…</div>
    </div>
  </div>

  <!-- Phase Management Tab -->
  <div id="tab-phases" class="tab-pane">
    <div class="section-header">
      <h2>阶段原子管理</h2>
      <span style="font-size:12px;color:var(--text3);margin-left:8px">按注入阶段查看/编辑世界书条目，点击条目名可直接修改内容与阶段归属</span>
    </div>
    <!-- Phase legend -->
    <div style="display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;font-size:12px">
      <span style="display:flex;align-items:center;gap:4px"><span class="phase-dot-sm" style="background:#7c3aed"></span>阶段1·规划 — 生成叙事大纲、检索请求（无正文输出）</span>
      <span style="display:flex;align-items:center;gap:4px"><span class="phase-dot-sm" style="background:#0369a1"></span>阶段3·生成 — 主叙事正文 + 选项</span>
      <span style="display:flex;align-items:center;gap:4px"><span class="phase-dot-sm" style="background:#065f46"></span>阶段4·更新 — UpdateVariable 状态写入</span>
    </div>
    <div id="phase-view"></div>
  </div>

  <!-- Regex Tab -->
  <div id="tab-regex" class="tab-pane">
    <div class="section-header">
      <h2>正则规则</h2>
      <span class="item-count" id="regex-count">0</span>
      <button class="btn" id="btn-add-regex" style="margin-left:auto;font-size:12px">＋ 添加规则</button>
    </div>
    <div id="regex-list" class="sortable-list">
      <div class="empty-hint">加载中…</div>
    </div>
  </div>

</div>

<!-- ── Toast ───────────────────────────────────────────────────────────── -->
<div id="toast-container"></div>

<!-- ── Prompt Edit Modal ────────────────────────────────────────────────── -->
<div id="modal-prompt" class="modal-overlay" style="display:none">
  <div class="modal modal-wide">
    <h3 id="modal-prompt-title">编辑提示词</h3>
    <div class="modal-scroll">
      <div class="form-row">
        <label>标识符 (identifier)</label>
        <input type="text" id="pe-identifier" placeholder="my_prompt_id">
      </div>
      <div class="form-row">
        <label>名称 (name)</label>
        <input type="text" id="pe-name" placeholder="提示词名称">
      </div>
      <div class="form-grid-3">
        <div class="form-row">
          <label>注入位置 (0=before, 1=after)</label>
          <input type="number" id="pe-injection-position" min="0" max="1" value="0">
        </div>
        <div class="form-row">
          <label>注入深度 (injection_depth)</label>
          <input type="number" id="pe-injection-depth" min="0" value="4">
        </div>
        <div class="form-row">
          <label>角色 (role)</label>
          <select id="pe-role">
            <option value="system">system</option>
            <option value="user">user</option>
            <option value="assistant">assistant</option>
          </select>
        </div>
      </div>
      <div style="display:flex;gap:20px;flex-wrap:wrap">
        <label class="check-row"><input type="checkbox" id="pe-enabled"><span>启用</span></label>
        <label class="check-row"><input type="checkbox" id="pe-system-prompt"><span>主系统提示 (system_prompt)</span></label>
        <label class="check-row"><input type="checkbox" id="pe-marker"><span>标记 (marker)</span></label>
        <label class="check-row"><input type="checkbox" id="pe-forbid-overrides"><span>禁止覆盖</span></label>
      </div>
      <div class="form-row">
        <label>内容 (content)</label>
        <textarea class="content-area" id="pe-content" placeholder="提示词内容…"></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn danger" id="btn-pe-delete" style="margin-right:auto">删除</button>
      <button class="btn" id="btn-pe-cancel">取消</button>
      <button class="btn primary" id="btn-pe-save">保存</button>
    </div>
  </div>
</div>

<!-- ── Worldbook Entry Edit Modal ────────────────────────────────────────── -->
<div id="modal-wb" class="modal-overlay" style="display:none">
  <div class="modal modal-wide">
    <h3 id="modal-wb-title">编辑世界书条目</h3>
    <div class="modal-scroll">
      <div class="form-row">
        <label>标题 (comment / name)</label>
        <input type="text" id="wb-name" placeholder="条目标题">
      </div>
      <div class="form-grid-3">
        <div class="form-row">
          <label>插入位置</label>
          <select id="wb-ext-position">
            <option value="0">系统提示前 (worldInfoBefore)</option>
            <option value="1">系统提示后 (worldInfoAfter)</option>
            <option value="4">用户消息 depth:0</option>
          </select>
        </div>
        <div class="form-row">
          <label>插入顺序 (insertion_order)</label>
          <input type="number" id="wb-insertion-order" min="0" value="100">
        </div>
        <div class="form-row">
          <label>深度 (depth)</label>
          <input type="number" id="wb-depth" min="0" value="4">
        </div>
      </div>
      <div style="display:flex;gap:20px;flex-wrap:wrap">
        <label class="check-row"><input type="checkbox" id="wb-enabled"><span>启用</span></label>
        <label class="check-row"><input type="checkbox" id="wb-constant"><span>常量 (constant)</span></label>
        <label class="check-row"><input type="checkbox" id="wb-selective"><span>选择性 (selective)</span></label>
      </div>
      <div class="form-row" style="margin-top:12px">
        <label style="font-weight:600;color:var(--text1)">注入阶段 (phases)</label>
        <div style="margin-top:6px;padding:10px 14px;border:1px solid var(--border);border-radius:6px;background:var(--bg2)">
          <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:8px">
            <label class="check-row">
              <input type="checkbox" id="wb-phase-auto">
              <span style="font-style:italic;color:var(--text3)">自动推导（根据插入位置/顺序）</span>
            </label>
          </div>
          <div id="wb-phase-manual" style="display:flex;gap:16px;flex-wrap:wrap">
            <label class="check-row">
              <input type="checkbox" id="wb-phase-1">
              <span style="color:#7c3aed;font-weight:500">&#x25cf; 阶段1 · 规划</span>
            </label>
            <label class="check-row">
              <input type="checkbox" id="wb-phase-3">
              <span style="color:#0369a1;font-weight:500">&#x25cf; 阶段3 · 生成</span>
            </label>
            <label class="check-row">
              <input type="checkbox" id="wb-phase-4">
              <span style="color:#065f46;font-weight:500">&#x25cf; 阶段4 · 更新</span>
            </label>
          </div>
          <div id="wb-phase-derived-hint" style="font-size:11px;color:var(--text3);margin-top:6px"></div>
        </div>
      </div>
      <div class="form-row">
        <label>关键词 (keys，逗号分隔)</label>
        <input type="text" id="wb-keys" placeholder="关键词1, 关键词2">
      </div>
      <div class="form-row">
        <label>内容 (content)</label>
        <textarea class="content-area" id="wb-content" placeholder="世界书内容…"></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn danger" id="btn-wb-delete" style="margin-right:auto;display:none">删除条目</button>
      <button class="btn" id="btn-wb-cancel">取消</button>
      <button class="btn primary" id="btn-wb-save">保存</button>
    </div>
  </div>
</div>

<!-- ── Regex Edit Modal ──────────────────────────────────────────────────── -->
<div id="modal-regex" class="modal-overlay" style="display:none">
  <div class="modal modal-wide">
    <h3 id="modal-regex-title">编辑正则规则</h3>
    <div class="modal-scroll">
      <div class="form-row">
        <label>脚本名称 (scriptName)</label>
        <input type="text" id="re-name" placeholder="规则名称">
      </div>
      <div class="form-row">
        <label>查找正则 (findRegex) — 支持 /pattern/flags 格式</label>
        <textarea class="mono" id="re-find" placeholder="/your-pattern/gi" rows="3"></textarea>
      </div>
      <div class="form-row">
        <label>替换字符串 (replaceString) — 支持 $1 $2 捕获组</label>
        <textarea class="mono" id="re-replace" placeholder="$1" rows="4"></textarea>
      </div>
      <div class="form-grid-2">
        <div class="form-row">
          <label>最小深度 (minDepth, 空=不限)</label>
          <input type="number" id="re-min-depth" placeholder="null" min="0">
        </div>
        <div class="form-row">
          <label>最大深度 (maxDepth, 空=不限)</label>
          <input type="number" id="re-max-depth" placeholder="null" min="0">
        </div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <label style="font-size:12px;color:var(--text3);font-weight:500">应用位置 (placement):</label>
        <label class="check-row"><input type="checkbox" id="re-place-user"><span>用户消息 [1]</span></label>
        <label class="check-row"><input type="checkbox" id="re-place-ai"><span>AI 回复 [2]</span></label>
      </div>
      <div style="display:flex;gap:20px;flex-wrap:wrap">
        <label class="check-row"><input type="checkbox" id="re-enabled"><span>启用</span></label>
        <label class="check-row"><input type="checkbox" id="re-markdown-only"><span>仅显示时 (markdownOnly)</span></label>
        <label class="check-row"><input type="checkbox" id="re-prompt-only"><span>仅发送时 (promptOnly)</span></label>
        <label class="check-row"><input type="checkbox" id="re-run-on-edit"><span>编辑时运行 (runOnEdit)</span></label>
      </div>

      <!-- Test Panel -->
      <div class="test-panel">
        <label>正则测试</label>
        <div class="test-row">
          <span style="font-size:12px;color:var(--text3)">输入文本：</span>
        </div>
        <textarea id="re-test-input" placeholder="在此输入测试文本…"></textarea>
        <div class="test-row">
          <button class="btn" id="btn-re-test" style="font-size:12px">▶ 测试</button>
          <span style="font-size:12px;color:var(--text3)">输出结果：</span>
        </div>
        <div class="test-output empty" id="re-test-output">（点击测试查看结果）</div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn danger" id="btn-re-delete" style="margin-right:auto">删除</button>
      <button class="btn" id="btn-re-cancel">取消</button>
      <button class="btn primary" id="btn-re-save">保存</button>
    </div>
  </div>
</div>

<script src="preset.js"></script>
</body>
</html>
